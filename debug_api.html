<!DOCTYPE html>
<html>
<head>
    <title>Debug API</title>
</head>
<body>
    <h1>API Debug</h1>
    <button onclick="testAPI()">Test Backend API</button>
    <div id="result"></div>
    
    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                console.log('Attempting to fetch from: http://localhost:8000/api/mcp/backend-servers');
                const response = await fetch('http://localhost:8000/api/mcp/backend-servers');
                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Success:', data);
                    resultDiv.innerHTML = `<h3>Success!</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    console.log('Error status:', response.status);
                    resultDiv.innerHTML = `<h3>Error: ${response.status}</h3>`;
                }
            } catch (error) {
                console.error('Fetch error:', error);
                resultDiv.innerHTML = `<h3>Network Error:</h3><p>${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
