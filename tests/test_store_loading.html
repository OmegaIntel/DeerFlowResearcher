<!DOCTYPE html>
<html>
<head>
    <title>Test Store Loading</title>
    <script>
        // Simulate the loadChat function behavior
        function simulateLoadChat() {
            const testMessages = [
                {
                    id: "msg1",
                    role: "user",
                    content: "What are the benefits of meditation?"
                },
                {
                    id: "msg2", 
                    role: "assistant",
                    content: JSON.stringify({
                        locale: "en-US",
                        has_enough_context: false,
                        thought: "The user is asking about meditation benefits"
                    })
                },
                {
                    id: "msg3",
                    role: "assistant",
                    content: "# Benefits of Meditation\n\n## Key Points\n- Reduces stress\n- Improves focus\n- Enhances emotional well-being\n\nMeditation has been practiced for thousands of years..."
                }
            ];

            console.log("=== Testing Message Type Detection ===");
            
            testMessages.forEach((msg, index) => {
                let agent = undefined;
                
                if (msg.role === "assistant" && msg.content) {
                    const content = msg.content.trim();
                    
                    // Check if it's a JSON message from planner/coordinator
                    if (content.startsWith('{')) {
                        try {
                            const parsed = JSON.parse(content);
                            if (parsed.has_enough_context !== undefined || parsed.thought) {
                                agent = "planner";
                            }
                        } catch (e) {
                            // Not JSON, continue checking
                        }
                    }
                    
                    // Check for reporter messages (usually contain markdown headers)
                    if (content.includes('# ') && content.length > 500) {
                        agent = "reporter";
                    }
                }
                
                console.log(`Message ${index + 1}:`);
                console.log(`  Role: ${msg.role}`);
                console.log(`  Agent: ${agent || 'none'}`);
                console.log(`  Content preview: ${msg.content.substring(0, 50)}...`);
            });
        }

        // Run test when page loads
        window.onload = () => {
            simulateLoadChat();
            
            // Check if the logic works
            const content1 = '{"has_enough_context": false}';
            const content2 = '# Research Report\n\nLots of content here...';
            
            console.log("\n=== Direct Tests ===");
            console.log("JSON starts with {:", content1.startsWith('{'));
            console.log("Has # and length > 500:", content2.includes('# '), content2.length > 500);
        };
    </script>
</head>
<body>
    <h1>Store Loading Test</h1>
    <p>Open browser console to see results</p>
</body>
</html>
