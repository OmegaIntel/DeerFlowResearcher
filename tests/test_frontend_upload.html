<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frontend Upload Test</title>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
</head>
<body>
    <h1>Frontend Upload Test</h1>
    <input type="file" id="fileInput">
    <button onclick="testUpload()">Test Upload</button>
    <pre id="output"></pre>

    <script>
        // Simulate frontend environment
        const API_BASE_URL = 'http://localhost:8000';
        
        function log(message) {
            const output = document.getElementById('output');
            output.textContent += message + '\n';
            console.log(message);
        }

        async function testUpload() {
            log('Starting upload test...');
            
            // First login to get a token
            const formData = new FormData();
            formData.append('username', 'test@example.com');
            formData.append('password', 'testpassword123');
            
            try {
                log('1. Logging in...');
                const loginResponse = await fetch(`${API_BASE_URL}/api/token`, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                const loginData = await loginResponse.json();
                log(`   Login response: ${JSON.stringify(loginData)}`);
                
                const token = loginData.access_token;
                
                // Set token in cookie like the frontend does
                Cookies.set('authToken', token, {
                    path: '/',
                    expires: 1/12,
                    sameSite: 'Strict'
                });
                
                log(`2. Token set in cookie: ${token.substring(0, 30)}...`);
                log(`   Cookie check: ${Cookies.get('authToken')?.substring(0, 30)}...`);
                
                // Now try upload
                const fileInput = document.getElementById('fileInput');
                if (!fileInput.files[0]) {
                    log('Please select a file first');
                    return;
                }
                
                const uploadFormData = new FormData();
                uploadFormData.append('file', fileInput.files[0]);
                
                log('3. Uploading file...');
                log(`   File: ${fileInput.files[0].name}`);
                log(`   Token from cookie: ${Cookies.get('authToken')?.substring(0, 30)}...`);
                
                const uploadResponse = await fetch(`${API_BASE_URL}/api/documents/upload`, {
                    method: 'POST',
                    body: uploadFormData,
                    headers: {
                        'Authorization': `Bearer ${Cookies.get('authToken')}`,
                    },
                    credentials: 'include'
                });
                
                log(`   Upload status: ${uploadResponse.status}`);
                log(`   Response headers: ${JSON.stringify(Object.fromEntries(uploadResponse.headers))}`);
                
                const uploadResult = await uploadResponse.text();
                log(`   Response: ${uploadResult}`);
                
            } catch (error) {
                log(`Error: ${error}`);
            }
        }
    </script>
</body>
</html>
