<!DOCTYPE html>
<html>
<head>
    <title>Test Frontend Auth</title>
</head>
<body>
    <h1>Test Frontend Auth</h1>
    <button onclick="testAuth()">Test Auth</button>
    <pre id="results"></pre>
    
    <script>
        async function testAuth() {
            const results = document.getElementById('results');
            results.textContent = 'Testing...\n';
            
            // First login to get token
            const loginData = new FormData();
            loginData.append('username', 'testuser@example.com');
            loginData.append('password', 'testpassword');
            
            try {
                const loginResp = await fetch('http://localhost:8000/api/token', {
                    method: 'POST',
                    body: loginData
                });
                
                const loginResult = await loginResp.json();
                const token = loginResult.access_token;
                results.textContent += `Got token: ${token.substring(0, 20)}...\n`;
                
                // Test file upload with token
                const formData = new FormData();
                const file = new File(['test content'], 'test.txt', { type: 'text/plain' });
                formData.append('file', file);
                
                results.textContent += '\nTesting upload with headers:\n';
                results.textContent += `Authorization: Bearer ${token.substring(0, 20)}...\n`;
                
                const uploadResp = await fetch('http://localhost:8000/api/documents/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                results.textContent += `\nUpload status: ${uploadResp.status}\n`;
                const uploadResult = await uploadResp.text();
                results.textContent += `Upload response: ${uploadResult}\n`;
                
            } catch (e) {
                results.textContent += `Error: ${e}\n`;
            }
        }
    </script>
</body>
</html>
