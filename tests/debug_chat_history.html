<!DOCTYPE html>
<html>
<head>
    <title>Debug Chat History</title>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
</head>
<body>
    <h1>Debug Chat History</h1>
    <button onclick="debugFlow()">Run Debug Flow</button>
    <pre id="output"></pre>

    <script>
        const output = document.getElementById('output');
        
        function log(msg, data = null) {
            output.innerHTML += msg + '\n';
            if (data) {
                output.innerHTML += JSON.stringify(data, null, 2) + '\n';
            }
            output.innerHTML += '\n';
        }

        async function debugFlow() {
            output.innerHTML = '';
            
            // 1. Check auth token
            log('1. Checking auth token...');
            const cookieToken = Cookies.get('authToken');
            const localToken = localStorage.getItem('authToken');
            const sessionToken = sessionStorage.getItem('authToken');
            
            log('Token sources:', {
                cookie: !!cookieToken,
                localStorage: !!localToken,
                sessionStorage: !!sessionToken
            });
            
            const token = cookieToken || localToken || sessionToken;
            if (!token) {
                log('ERROR: No token found!');
                return;
            }
            
            log('Token found:', token.substring(0, 30) + '...');
            
            // 2. Call backend API directly
            log('\n2. Calling backend API directly...');
            try {
                const response = await fetch('http://localhost:8000/api/chat/sessions', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    log('Sessions found:', data.length);
                    if (data.length > 0) {
                        log('First session:', data[0]);
                    }
                } else {
                    log('ERROR:', await response.text());
                }
            } catch (e) {
                log('ERROR:', e.message);
            }
            
            // 3. Check frontend API URL resolution
            log('\n3. Checking frontend API URL...');
            const frontendApiUrl = 'http://localhost:3000/api/chat/sessions';
            log('Frontend would call:', frontendApiUrl);
            
            // 4. Check what the frontend sees
            log('\n4. Simulating frontend behavior...');
            const NEXT_PUBLIC_API_URL = 'http://localhost:8000/api';
            const resolvedUrl = NEXT_PUBLIC_API_URL + '/chat/sessions';
            log('Resolved URL:', resolvedUrl);
            
            // 5. Make the exact call the frontend would make
            log('\n5. Making frontend-style API call...');
            try {
                const response = await fetch(resolvedUrl, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                    }
                });
                
                log('Response:', {
                    status: response.status,
                    ok: response.ok,
                    headers: Object.fromEntries(response.headers.entries())
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log('Success! Sessions:', data);
                } else {
                    const errorText = await response.text();
                    log('Error response:', errorText);
                }
            } catch (e) {
                log('Network error:', e.message);
            }
        }
        
        // Auto-run on load if token exists
        window.onload = () => {
            const hasToken = Cookies.get('authToken') || localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
            if (hasToken) {
                log('Token detected, auto-running debug...\n');
                debugFlow();
            } else {
                log('No token detected. Please login first.');
            }
        };
    </script>
</body>
</html>
