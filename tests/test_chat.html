<!DOCTYPE html>
<html>
<head>
    <title>Chat Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
        .message { margin: 5px 0; padding: 5px; }
        .user { background: #e3f2fd; }
        .assistant { background: #f5f5f5; }
        .error { background: #ffebee; color: #c62828; }
        button { padding: 10px 20px; margin: 5px; }
    </style>
</head>
<body>
    <h1>OpenBB Copilot Chat Test</h1>
    
    <div id="messages"></div>
    
    <input type="text" id="messageInput" placeholder="Type a message..." style="width: 300px; padding: 5px;">
    <button onclick="sendMessage()">Send</button>
    <button onclick="createSession()">Create New Session</button>
    
    <div>
        <p>Session ID: <span id="sessionId">None</span></p>
        <p>Status: <span id="status">Ready</span></p>
    </div>

    <script>
        let currentSessionId = null;
        
        async function createSession() {
            try {
                setStatus('Creating session...');
                const response = await fetch('/api/v1/copilot/session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ initial_ticker: 'AAPL' })
                });
                
                const data = await response.json();
                console.log('Session response:', data);
                
                if (data.success) {
                    currentSessionId = data.data.session_id;
                    document.getElementById('sessionId').textContent = currentSessionId;
                    addMessage('system', 'Session created: ' + currentSessionId);
                    setStatus('Ready');
                } else {
                    addMessage('error', 'Failed to create session: ' + (data.error || 'Unknown error'));
                    setStatus('Error');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('error', 'Error creating session: ' + error.message);
                setStatus('Error');
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!currentSessionId) {
                await createSession();
            }
            
            input.value = '';
            addMessage('user', message);
            setStatus('Sending...');
            
            try {
                const response = await fetch('/api/v1/copilot/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: currentSessionId,
                        message: message
                    })
                });
                
                const data = await response.json();
                console.log('Chat response:', data);
                
                if (data.success) {
                    addMessage('assistant', data.data.response);
                    setStatus('Ready');
                } else {
                    addMessage('error', 'Error: ' + (data.error || 'Unknown error'));
                    setStatus('Error');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('error', 'Error: ' + error.message);
                setStatus('Error');
            }
        }
        
        function addMessage(type, content) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            messageDiv.textContent = type.toUpperCase() + ': ' + content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function setStatus(status) {
            document.getElementById('status').textContent = status;
        }
        
        // Enter key to send
        document.getElementById('messageInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        // Create initial session on load
        window.onload = function() {
            createSession();
        };
    </script>
</body>
</html>
