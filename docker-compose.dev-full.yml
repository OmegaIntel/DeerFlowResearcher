services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: deer_db
      MYSQL_USER: deeruser
      MYSQL_PASSWORD: deerpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - deer-flow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_HOST=mysql  # Override the deer-flow-mysql from .env
      - PYTHONUNBUFFERED=1
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - deer-flow-network
    volumes:
      - ./src:/app/src
      - ./conf.yaml:/app/conf.yaml

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/next.config.js:/app/next.config.js
      - ./web/tailwind.config.ts:/app/tailwind.config.ts
      - ./web/postcss.config.js:/app/postcss.config.js
    environment:
      - NODE_ENV=development
    networks:
      - deer-flow-network

networks:
  deer-flow-network:
    driver: bridge

volumes:
  mysql_data: