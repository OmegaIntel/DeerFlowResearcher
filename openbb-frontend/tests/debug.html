<!DOCTYPE html>
<html>
<head>
    <title>Debug Overview</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #fff; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #333; }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        pre { background: #2a2a2a; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Debug: API Data Loading</h1>
    <div id="results"></div>

    <script type="module">
        const results = document.getElementById('results');
        
        async function testAPI() {
            // Test cachedApi import
            try {
                const module = await import('/src/services/cachedApi.ts');
                results.innerHTML += '<div class="section success">✓ CachedApi module loaded</div>';
                
                // Test API call
                const api = module.cachedApi;
                const data = await api.getFundamentalOverview('AAPL');
                
                results.innerHTML += '<div class="section success">✓ API call successful</div>';
                results.innerHTML += '<div class="section"><h3>Data received:</h3><pre>' + 
                    JSON.stringify(data, null, 2).substring(0, 500) + '...</pre></div>';
                    
            } catch (error) {
                results.innerHTML += '<div class="section error">✗ Error: ' + error.message + '</div>';
                results.innerHTML += '<div class="section"><pre>' + error.stack + '</pre></div>';
            }
        }
        
        // Test direct API
        async function testDirectAPI() {
            try {
                const response = await fetch('/api/v1/equity/fundamental/overview?symbol=AAPL');
                const data = await response.json();
                
                results.innerHTML += '<div class="section"><h3>Direct API Response:</h3><pre>' + 
                    JSON.stringify(data, null, 2).substring(0, 500) + '...</pre></div>';
                    
                if (data.success && data.data) {
                    results.innerHTML += '<div class="section success">✓ Direct API working correctly</div>';
                } else {
                    results.innerHTML += '<div class="section error">✗ API returned unexpected format</div>';
                }
            } catch (error) {
                results.innerHTML += '<div class="section error">✗ Direct API Error: ' + error.message + '</div>';
            }
        }
        
        testDirectAPI();
        testAPI();
    </script>
</body>
</html>
