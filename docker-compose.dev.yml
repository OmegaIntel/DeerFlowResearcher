version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: deer-flow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: deer_flow
      MYSQL_USER: deer_user
      MYSQL_PASSWORD: deer_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - deer-flow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: deer-flow-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_USER_NAME: deer_user
      DATABASE_PASSWORD: deer_password
      DATABASE_NAME: deer_flow
      PYTHONUNBUFFERED: 1
    volumes:
      - ./conf.yaml:/app/conf.yaml
      - ./mcp-servers:/app/mcp-servers
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - deer-flow-network
    command: ["uv", "run", "uvicorn", "src.server.app:app", "--host", "0.0.0.0", "--port", "8000", "--h11-max-incomplete-event-size", "104857600"]

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: deer-flow-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - deer-flow-network
    volumes:
      - ./web/src:/app/src
      - ./web/public:/app/public
      - ./web/next.config.js:/app/next.config.js
      - ./web/tailwind.config.ts:/app/tailwind.config.ts
      - ./web/tsconfig.json:/app/tsconfig.json
      - ./web/postcss.config.js:/app/postcss.config.js

networks:
  deer-flow-network:
    driver: bridge

volumes:
  mysql_data: